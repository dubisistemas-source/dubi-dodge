<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubi Games</title>

<style>
body{
    margin:0;
    min-height:100vh;

    background:
    radial-gradient(circle at top,#1b1464,#090b1f 60%,#020308);

    color:white;
    font-family:'Segoe UI',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
}
h1{
    font-size:50px;
}

.card{
    background:#222;
    padding:20px;
    margin:20px auto;
    width:300px;
    border-radius:15px;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}
input{
    width:90%;
    padding:10px;
    font-size:16px;
    border-radius:8px;
    border:none;
}
</style>
</head>
<body>

<h1>🎮 DUBI GAMES</h1>

<div class="card">
     <h2>Cuenta</h2>
    
        <input id="username" type="text" placeholder="Nombre de usuario"><br><br>

        <input id="email" type="email" placeholder="Correo"><br><br>
    
        <input id="password" type="password" placeholder="Contraseña"><br><br>
    
        <button id="btnRegistro">Crear cuenta</button>
    
        <button id="btnLogin">Iniciar sesión</button>
    
        <p id="estado"></p>
    </div>

<div class="card" id="gameCard" style="display:none;">
    <h2>Dubi Dodge</h2>
    <p>Esquiva enemigos, recoge monedas y derrota jefes.</p>

    <a href="dubi-dodge.html">
        <button>Jugar</button>
    </a>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyDqKYqxnS9aSiMt4tTZ_Lv747VRvL6VrBc",
      authDomain: "dubi-dodge.firebaseapp.com",
      projectId: "dubi-dodge",
      storageBucket: "dubi-dodge.firebasestorage.app",
      messagingSenderId: "885842968174",
      appId: "1:885842968174:web:bc90859c42505538bdf07f",
      measurementId: "G-8RDTKGXXQ5"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const username = document.getElementById("username");
    const estado = document.getElementById("estado");
    const gameCard = document.getElementById("gameCard");
    
    document.getElementById("btnRegistro").onclick = async () => {
  try {

    const userCredential = await createUserWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );

    await setDoc(
      doc(db, "usuarios", userCredential.user.uid),
      {
        username: username.value,
        email: email.value,
        monedas: 0,
        record: 0,
        nivel: 1,
        recordPuntos: 0,
        recordTiempo: 0
      }
    );

    estado.textContent = "Cuenta creada correctamente";
    gameCard.style.display = "block";

  } catch (error) {
    estado.textContent = error.message;
  }
};
    
document.getElementById("btnLogin").onclick = async () => {
  try {

    await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );

    estado.textContent = "Sesión iniciada";
    gameCard.style.display = "block";

  } catch (error) {
    estado.textContent = error.message;
  }
};
    
    </script>
</body>
</html>

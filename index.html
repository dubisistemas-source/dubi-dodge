<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubi Games</title>
body{
  flex-direction:column;
}
<style>
body{
    margin:0;
    min-height:100vh;

    background:
    radial-gradient(circle at top, #1d2cff 0%, #0a0a2a 40%, #000010 100%);

    color:white;
    font-family:Arial, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
}
h1{
    font-size:60px;
    margin-bottom:20px;

    color:#00aaff;

    text-shadow:
    0 0 10px #00aaff,
    0 0 20px #00aaff,
    0 0 30px #00aaff;
}

.card{
    background:rgba(15,15,40,0.9);

    padding:35px;

    margin:20px auto;

    width:90%;
    max-width:450px;

    border-radius:25px;

    border:1px solid #3b82f6;

    box-shadow:
    0 0 20px rgba(59,130,246,0.4),
    0 0 40px rgba(59,130,246,0.2);

    backdrop-filter:blur(10px);
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}
input{
    width:100%;
    padding:15px;

    background:#0d1230;

    color:white;

    border:1px solid #3b82f6;

    border-radius:12px;

    font-size:18px;

    box-sizing:border-box;
}
button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
.crear{
    background:linear-gradient(
        90deg,
        #00aaff,
        #0066ff
    );
}

.login{
    background:linear-gradient(
        90deg,
        #8b5cf6,
        #c026d3
    );
}

.jugar{
    background:linear-gradient(
        90deg,
        #22c55e,
        #16a34a
    );
}
</style>
</head>
<body>

<h1>🎮 DUBI GAMES</h1>

<div class="card">
     <h2>Cuenta</h2>
    
        <input id="username" type="text" placeholder="Nombre de usuario"><br><br>

        <input id="email" type="email" placeholder="Correo"><br><br>
    
        <input id="password" type="password" placeholder="Contraseña"><br><br>
    
        <button id="btnRegistro" class="crear">
          Crear cuenta
      </button>
      
      <button id="btnLogin" class="login">
          Iniciar sesión
      </button>
    
        <p id="estado"></p>
    </div>

<div class="card" id="gameCard" style="display:none;">
    <h2>Dubi Dodge</h2>
    <p>Esquiva enemigos, recoge monedas y derrota jefes.</p>

    <a href="dubi-dodge.html">
      <button class="jugar">Jugar</button>
    </a>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyDqKYqxnS9aSiMt4tTZ_Lv747VRvL6VrBc",
      authDomain: "dubi-dodge.firebaseapp.com",
      projectId: "dubi-dodge",
      storageBucket: "dubi-dodge.firebasestorage.app",
      messagingSenderId: "885842968174",
      appId: "1:885842968174:web:bc90859c42505538bdf07f",
      measurementId: "G-8RDTKGXXQ5"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const username = document.getElementById("username");
    const estado = document.getElementById("estado");
    const gameCard = document.getElementById("gameCard");
    
    document.getElementById("btnRegistro").onclick = async () => {
  try {

    const userCredential = await createUserWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );

    await setDoc(
      doc(db, "usuarios", userCredential.user.uid),
      {
        username: username.value,
        email: email.value,
        monedas: 0,
        record: 0,
        nivel: 1,
        recordPuntos: 0,
        recordTiempo: 0
      }
    );

    estado.textContent = "Cuenta creada correctamente";
    gameCard.style.display = "block";

  } catch (error) {
    estado.textContent = error.message;
  }
};
    
document.getElementById("btnLogin").onclick = async () => {
  try {

    await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );

    estado.textContent = "Sesión iniciada";
    gameCard.style.display = "block";

  } catch (error) {
    estado.textContent = error.message;
  }
};
    
    </script>
</body>
</html>
